spring:
  application:
    name: discodeit
  profiles:
    active: dev # 기본값 dev 프로필 활성화
  jpa:
    open-in-view: false
  sql:
    init:
      schema-locations: classpath:schema.sql
      mode: always # 항상 스키마 초기화 스크립트 실행
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  boot:
    admin:
      client:
        instance:
          name: discodeit

# Actuator 설정
management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, loggers
  info:
    env:
      enabled: true # info


# 커스텀
discodeit:
  storage:
    type: ${STORAGE_TYPE:local} # local | s3 (기본값: local)
    local:
      root-path: ${STORAGE_LOCAL_ROOT_PATH:.discodeit/storage}
    s3:
      access-key: ${AWS_S3_ACCESS_KEY}
      secret-key: ${AWS_S3_SECRET_KEY}
      region: ${AWS_S3_REGION}
      bucket: ${AWS_S3_BUCKET}
      presigned-url-expiration: ${AWS_S3_PRESIGNED_URL_EXPIRATION:600} # (기본값: 10분)

info:
  application:
    name: Discodeit
    version: 1.7.0
  java:
    version: 17
  spring-boot:
    version: 3.4.0
  settings:
    datasource:
      url: ${spring.datasource.url}
      driver-class-name: ${spring.datasource.driver-class-name}
    jpa:
      ddl-auto: ${spring.jpa.hibernate.ddl-auto}
    storage:
      type: ${discodeit.storage.type}
      path: ${discodeit.storage.local.root-path}
    multipart:
      max-file-size: ${spring.servlet.multipart.max-file-size}
      max-request-size: ${spring.servlet.multipart.max-request-size}

# jwt
jwt:
  secret: ${JWT_SECRET} # 32자 이상 문자열
  access-token-expiry: 3600000 # 1시간 (1000 * 60 * 60)
  refresh-token-expiry: 604800000 # 7일 (1000 * 60 * 60 * 24 * 7)

# admin 초기 설정
admin:
  default-password: ${ADMIN_PASSWORD:admin}