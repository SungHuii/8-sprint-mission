version: '3.8'

services:
  # Reverse Proxy (Nginx)
  proxy:
    image: nginx:latest
    container_name: proxy
    ports:
      - "3000:3000" # 클라이언트는 3000번 포트로만 접근
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./src/main/resources/static:/usr/share/nginx/html
    depends_on:
      - backend
    networks:
      - discodeit-network

  # Backend (Spring Boot) - 3대 복제
  backend:
    build: .
    deploy:
      replicas: 3
    env_file:
      - .env
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/discodeit
      - REDIS_HOST=redis
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=broker:29092
      - SPRING_SQL_INIT_MODE=never
      # Storage 설정
      - STORAGE_TYPE=${STORAGE_TYPE}
      - AWS_S3_ACCESS_KEY=${AWS_S3_ACCESS_KEY}
      - AWS_S3_SECRET_KEY=${AWS_S3_SECRET_KEY}
      - AWS_S3_REGION=${AWS_S3_REGION}
      - AWS_S3_BUCKET=${AWS_S3_BUCKET}
    depends_on:
      - db
      - redis
      - broker
    volumes:
      - ./.discodeit:/app/.discodeit # 로컬 파일 저장소
    networks:
      - discodeit-network

  # Database (PostgreSQL)
  db:
    image: postgres:17.2
    container_name: db
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-discodeit}
      - POSTGRES_USER=${POSTGRES_USER:-discodeit_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-discodeit1234}
    volumes:
      - ./.postgres-data:/var/lib/postgresql/data # DB 데이터 유지
      # 초기화 스크립트 (최초 실행 시 자동 실행)
      - ./src/main/resources/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    ports:
      - "5433:5432" # 외부 DB 툴 접속용
    networks:
      - discodeit-network

  # Memory DB (Redis)
  redis:
    image: redis:7.2-alpine
    container_name: redis
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    networks:
      - discodeit-network

  # Message Broker (Kafka)
  broker:
    image: apache/kafka:latest
    container_name: broker
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://broker:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_NODE_ID: 1
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@broker:29093
      KAFKA_LISTENERS: PLAINTEXT://broker:29092,CONTROLLER://broker:29093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    ports:
      - "9092:9092"
    networks:
      - discodeit-network

volumes:
  redis-data:

networks:
  discodeit-network:
    driver: bridge