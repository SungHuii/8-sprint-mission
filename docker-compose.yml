version: '3.8'

services:
  # 애플리케이션 서비스
  discodeit-app:
    container_name: discodeit-app
    build: . # 현재 디렉토리의 Dockerfile 사용
    ports:
      - "8081:80" # 호스트 8081, 컨테이너 80
    env_file:
      - .env # 환경변수 주입
    environment:
      # DB 접속 정보
      - SPRING_DATASOURCE_URL=${DOCKER_DATASOURCE_URL}
      - # Storage 설정 (추가)
      - STORAGE_TYPE=${STORAGE_TYPE}
      - AWS_S3_ACCESS_KEY=${AWS_S3_ACCESS_KEY}
      - AWS_S3_SECRET_KEY=${AWS_S3_SECRET_KEY}
      - AWS_S3_REGION=${AWS_S3_REGION}
      - AWS_S3_BUCKET=${AWS_S3_BUCKET}
    depends_on:
      - discodeit-db # DB 가장 먼저 실행
    volumes:
      - ./.discodeit:/app/.discodeit # 로컬 파일 저장소
      - ./.discodeit-files:/app/.discodeit-files # BinaryContentStorage 데이터 유지
    networks:
      - discodeit-network

  # DB 서비스 (PostgreSQL)
  discodeit-db:
    container_name: discodeit-db
    image: postgres:17.2
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - ./.postgres-data:/var/lib/postgresql/data # DB 데이터 유지
      # 초기화 스크립트 (최초 실행 시 자동 실행)
      - ./src/main/resources/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    ports:
      - "5433:5432" # 호스트 접속 가능
    networks:
      - discodeit-network

networks:
  discodeit-network:
    driver: bridge